services:
  - type: web
    name: iwadco
    env: php
    buildCommand: ""
    startCommand: php -S 0.0.0.0:$PORT -t iwadco
    envVars:
      - key: PHP_VERSION
        value: 8.2
    # Database connection will be configured via environment variables
    # Add your database credentials in Render dashboard

databases:
  - name: iwadco2_db
    databaseName: iwadco2_db
    user: iwadco_user
    plan: free
    # Note: Render provides PostgreSQL by default
    # For MySQL, you'll need to use an external MySQL service
    # Options: PlanetScale, AWS RDS, or Render's MySQL (if available)

